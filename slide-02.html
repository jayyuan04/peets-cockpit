                type:'bar',barWidth:'55%',
                label:{show:true,position:'right',fontSize:8,formatter:p=>p.value+'家·'+p.data.hits+'次'},
                itemStyle:{color:C.blue,borderRadius:[0,3,3,0],opacity:0.85},
                emphasis:{itemStyle:{color:C.red}}
            }]
        });

        let currentItem = '蒸汽棒干净且无垢？';

        chart.on('click', function(params) {
            currentItem = params.name;
            document.getElementById('store-title').textContent = '涉及门店 · ' + currentItem;
            updateStoreTable(currentItem);
            chart.dispatchAction({type:'downplay'});
            chart.dispatchAction({type:'highlight',name:params.name});
        });

        function updateStoreTable(item) {
            const stores = storeMap[item] || [];
            const tbody = document.getElementById('store-table-body');
            document.getElementById('store-count').textContent = '共 ' + stores.length + ' 家门店';
            tbody.innerHTML = '';
            stores.forEach(function(s) {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td style="padding:0.3rem 0.5rem;">' + s.name + '</td>' +
                    '<td style="padding:0.3rem 0.5rem;"><span style="color:' + (regionColor[s.reg]||'#666') + ';font-weight:600;">' + s.reg + '</span></td>' +
                    '<td style="padding:0.3rem 0.5rem;">' + s.city + '</td>' +
                    '<td style="padding:0.3rem 0.5rem;text-align:center;font-weight:600;">' + s.cnt + '次</td>';
                tbody.appendChild(tr);
            });
        }

        updateStoreTable('蒸汽棒干净且无垢？');
        window.addEventListener('resize',()=>chart.resize());
    </script>
</body>
</html>
